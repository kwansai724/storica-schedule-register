name: ストアカ日程登録

on:
  repository_dispatch:
    types: [schedule-registration]
  workflow_dispatch:

concurrency:
  group: storica-register
  cancel-in-progress: false

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Mask secrets
        run: |
          echo "::add-mask::${{ secrets.STORICA_SESSION }}"

      - name: Restore session
        run: echo '${{ secrets.STORICA_SESSION }}' > session.json

      - name: Run registration
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
          HEADLESS: 'true'
        run: npm start

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: screenshots/
          retention-days: 7
