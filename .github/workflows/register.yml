name: ストアカ日程登録

on:
  repository_dispatch:
    types: [schedule-registration]
  workflow_dispatch:

concurrency:
  group: storica-register
  cancel-in-progress: false

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Mask secrets
        run: echo "::add-mask::$SECRET"
        env:
          SECRET: ${{ secrets.STORICA_SESSION }}

      - name: Restore session
        run: echo "$SECRET" > session.json
        env:
          SECRET: ${{ secrets.STORICA_SESSION }}

      - name: Mask sensitive data in payload
        run: |
          for field in emergencyContact teacherName classId teacherId; do
            jq -r --arg f "$field" '.client_payload.schedules[][$f] // empty' "$GITHUB_EVENT_PATH" | while IFS= read -r v; do
              [ -n "$v" ] && echo "::add-mask::$v"
            done
          done

      - name: Run registration
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
          HEADLESS: 'true'
        run: npm start

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshots
          path: screenshots/
          retention-days: 7
